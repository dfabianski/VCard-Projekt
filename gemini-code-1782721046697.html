<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominik Fabianski | Digitale Visitenkarte</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212; /* Moderner Darkmode-Hintergrund */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #333; /* Hier kommt später dein Bild hin */
            margin: 0 auto 20px;
            border: 3px solid #00adb5; /* Akzentfarbe */
        }
        h1 {
            margin: 10px 0 5px;
            font-size: 24px;
        }
        p {
            color: #bbbbbb;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background: #00adb5;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #007c82;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar">
        </div>
    <h1>Dominik Fabianski</h1>
    <p>Kaufmann für Büromanagement<br>Hergarten Gruppe</p>
    
    <a href="visitenkarte.vcf" class="btn" download>Kontakt speichern</a>
</div>

</body>
</html>
